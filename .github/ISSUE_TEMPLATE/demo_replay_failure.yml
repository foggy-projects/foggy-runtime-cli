name: Demo replay failure
description: Report a release-installed Foggy AI analysis demo replay failure.
title: "[Demo Replay]: "
labels:
  - demo
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this when the sales-drop install-state or replay flow fails with release-installed CLI assets.
  - type: input
    id: cli-version
    attributes:
      label: CLI release
      placeholder: v0.1.5
    validations:
      required: true
  - type: input
    id: skill-version
    attributes:
      label: Skill release
      placeholder: foggy-ai-analysis-demo-skill-0.1.5 from v0.1.5 public CLI release
    validations:
      required: true
  - type: input
    id: runtime-url
    attributes:
      label: Runtime URL
      placeholder: http://127.0.0.1:18066
    validations:
      required: true
  - type: input
    id: launcher-version
    attributes:
      label: Java launcher release
      placeholder: runtime-api-launcher-v0.1.1
    validations:
      required: true
  - type: input
    id: namespace
    attributes:
      label: Namespace
      placeholder: salesdrop
    validations:
      required: true
  - type: input
    id: datasource-mode
    attributes:
      label: Datasource mode
      placeholder: runtime default SQLite datasource / Runtime API-managed named datasource
    validations:
      required: true
  - type: input
    id: sqlite-path
    attributes:
      label: SQLite path or datasource type
      description: Remove secrets and do not paste production credentials.
      placeholder: C:\...\runtime\foggy_mcp_lite.db
    validations:
      required: true
  - type: input
    id: security-mode
    attributes:
      label: Runtime securityMode
      placeholder: none-dev-test-only
    validations:
      required: true
  - type: input
    id: launcher
    attributes:
      label: Launcher source
      description: Local jar path, Docker image, or other runtime source.
      placeholder: runtime-api-launcher-v0.1.1 / foggy-mcp-launcher-9.1.0.beta-runtime-api.jar
    validations:
      required: true
  - type: input
    id: legacy-datasource-dir
    attributes:
      label: Launcher legacyDatasourceConfigDir
      description: Include when the launcher output has this field. Use "not present" for older launchers.
      placeholder: C:\...\runtime\legacy-datasources / not present
    validations:
      required: false
  - type: textarea
    id: command
    attributes:
      label: Replay command
      render: shell
    validations:
      required: true
  - type: textarea
    id: failure
    attributes:
      label: Failure point
      description: Name the first failed step and include exit code or error code.
      render: text
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence files or excerpts
      description: Include summary.json, question-bank-replay.json, command-status.json, runtime.out.log, runtime.err.log, runtime-log classification, and sanitized stdout/stderr snippets when available.
      render: text
    validations:
      required: true
  - type: textarea
    id: mcp-ide
    attributes:
      label: MCP IDE details, if relevant
      description: Include endpoint, transport, headers support, initialize result, and tools/list result. The current verified endpoint is /mcp/analyst/rpc with X-NS.
      render: text
    validations:
      required: false
  - type: textarea
    id: boundary
    attributes:
      label: Boundary notes
      description: Mention whether this is dev/test Runtime API and whether production permission is involved.
    validations:
      required: false
