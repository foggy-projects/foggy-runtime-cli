name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release package
        run: bash scripts/build-release.sh --clean

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: foggy-runtime-cli-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/release-manifest.json
            scripts/install-foggy-runtime-cli.ps1
            scripts/install-foggy-runtime-cli.sh

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          cat > release-notes.md <<EOF
          Foggy Runtime CLI release ${tag}.

          Assets include the wheel, sdist, install scripts, SHA256SUMS, and release-manifest.json.

          Public Foggy AI analysis demo onboarding uses three release inputs:

          1. Install this CLI release.
          2. Download the foggy-ai-analysis-demo Skill companion assets from this release when present.
          3. Download Java Runtime API launcher runtime-api-launcher-v0.1.1 from https://github.com/foggy-projects/foggy-data-mcp-bridge/releases/tag/runtime-api-launcher-v0.1.1.

          The sales-drop public demo should run with the Java runtime default SQLite datasource and:

          \`\`\`powershell
          foggy-runtime --base-url http://127.0.0.1:18066 demo sales-drop replay --skill-dir <unzipped-skill> --evidence-dir <evidence> --sqlite-path <runtime-default-sqlite> --use-default-datasource
          \`\`\`

          Runtime API launcher releases are dev/test-only. Production permission, auth, RBAC, audit, and governance remain a later phase.
          EOF
          gh release create "$tag" \
            dist/*.whl \
            dist/*.tar.gz \
            dist/SHA256SUMS \
            dist/release-manifest.json \
            scripts/install-foggy-runtime-cli.ps1 \
            scripts/install-foggy-runtime-cli.sh \
            --title "Foggy Runtime CLI ${tag}" \
            --notes-file release-notes.md
