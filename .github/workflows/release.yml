name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release package
        run: bash scripts/build-release.sh --clean

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: foggy-runtime-cli-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/release-manifest.json
            scripts/install-foggy-runtime-cli.ps1
            scripts/install-foggy-runtime-cli.sh

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" \
            dist/*.whl \
            dist/*.tar.gz \
            dist/SHA256SUMS \
            dist/release-manifest.json \
            scripts/install-foggy-runtime-cli.ps1 \
            scripts/install-foggy-runtime-cli.sh \
            --title "Foggy Runtime CLI ${tag}" \
            --notes "Foggy Runtime CLI release ${tag}. Assets include wheel, sdist, install scripts, SHA256SUMS, and release-manifest.json."
